<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGS</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            max-width: 800px;
            margin: auto;
            padding: 5px;
        }

        .edit-button {
            padding: 5px 10px;
            margin: 1px 3px;
            background-color: lightgray;
            cursor: pointer;
        }

        h1 {
            margin-block-end: unset;
        }

        .actual-time {
            margin-block-end: 0.67em;
        }

        .category-header {
            margin: 10px 5px 5px;
        }

        .category-order {
            margin: 3px;
            text-decoration: none;
        }

        .hidden {
            display: none;
        }

        .group-header {
            font-family: "Tahoma", Geneva, sans-serif;
            background-color: #7030A0;
            color: white;
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            margin-top: 20px;
            padding: 3px;
            cursor: pointer;
        }

        .order {
            position: relative;
            border: 1px solid lightgray;
        }

        .order-info {
            font-family: "Tahoma", Geneva, sans-serif;
            position: absolute;
            right: 0;
            top: 8px;
            font-size: 0.7em;
            display: flex;
            align-items: center;
            gap: 3px;
            transition: visibility 0.3s;
            padding-left: 10px;
            padding-right: 5px;
        }

        .info-img {
            height: 16px;
        }

        .order-status {
            border: 1px solid lightgray;
            border-radius: 5px;
            padding: 1px 3px;
            min-height: 16px;
            min-width: 16px;
        }

        .order-header {
            padding: 5px;
            cursor: pointer;
            background-color: antiquewhite;
        }

        .ready {
            color: lightgray;
        }

        .returned > .order-header {
            color: red;
        }

        .order-id,
        .target-date,
        .address {
            padding: 3px;
            white-space: nowrap;
        }

        .order-id {
            min-width: 70px;
            display: inline-block;
            text-align: center;
        }

        .order-id a {
            text-decoration: none;
            color: inherit;
        }

        .address {
            font-weight: bold;
        }

        .target-date {
            margin-right: 40px;
        }

        .create-at {
            font-family: "Tahoma", Geneva, sans-serif;
            font-size: 0.7em;
            padding-left: 5px;
            border-bottom: 1px solid lightgray;
            background-color: antiquewhite;
        }

        .tasks {
            position: relative;
            margin: 5px auto 10px;
            width: 98%;
            max-width: 600px;
        }

        table {
            border-collapse: collapse;
        }

        .tasks td {
            border: 1px solid lightgray;
            padding: 5px;
        }

        .task {
        }

        .task-work {
            width: 60%;
        }

        .task-equipment {
        }

        .task-volume,
        .trash-task-volume {
            font-size: 24px;
            font-weight: bold;
            width: 60px;
            text-align: center;
        }

        .trash-task-header {
            padding: 10px 0 5px;
        }

        .comment {
            font-family: "Tahoma", Geneva, sans-serif;
        }

        .comment-header {
            margin-left: 10px;
        }

        .comment-content,
        .finalize-comments {
            margin-left: 20px;
            margin-bottom: 5px;
            font-size: 0.8em;
        }

        .finalize-comment-data {
            vertical-align: top;
        }

        .blue-mark {
            background-color: blue;
            color: white;
        }

        .blue {
            color: blue;
        }

        .red-mark {
            background-color: red;
            color: white;
        }

        .red {
            color: red;
        }

        .black-mark {
            background-color: black;
            color: white;
        }

        .grey-mark {
            background-color: slategray;
            color: white;
        }

        .yellow-mark {
            background-color: yellow;
        }

        .coral-mark {
            background-color: coral;
        }

        .sky-blue-mark {
            background-color: cornflowerblue;
            color: white;
        }

        .olive-mark {
            background-color: olive;
            color: white;
        }

        .green-mark {
            background-color: green;
            color: white;
        }

        .response {
            position: absolute;
            top: 0;
            left: calc(100% + 3px);
            padding: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            border: 1px solid lightgray;
            border-radius: 10px;
            cursor: pointer;
            background-color: grey;
            opacity: 30%;
            transition: all 0.3s ease;
        }

        .response:hover {
            background-color: green;
            opacity: 100%;
        }

        .footer {
            margin-top: auto;
            padding: 100px 0 20px;
            text-align: center;
        }

        @media (max-width: 800px) {
            .tasks {
                margin-left: 5px;
            }
        }

        @media (max-width: 720px) {
            .response {
                right: 0;
                top: calc(100% + 3px);
                left: unset;
            }

            .response-buffer {
                height: 50px;
            }
        }

        @media (max-width: 560px) {
            .order-status {
                font-size: 0;
                border-radius: 50%;
            }
        }

        @media (max-width: 480px) {
            .order-header {
                display: flex;
                flex-direction: column;
            }

            .order-id,
            .target-date {
                width: max-content;
            }
        }

    </style>
</head>
<body>

<a th:if="${admin}"
   class="edit-button"
   href="/edit">РЕДАКТИРОВАТЬ
</a>

<h1>KGS</h1>
<div class="actual-time" th:text="'Актуально на ' + ${now}"></div>
<button id="global-visible-switch">Скрыть заявки</button>

<div class="returned-orders" th:if="${returned != null && returned.size() > 0}">
    <h3 class="category-header red">Возвращены</h3>
    <div class="category-content">
        <span th:each="orderId : ${returned}">
            <a class="order-id red-mark category-order"
               th:text="${orderId}"
               th:href="'#order-'+${orderId}"
               th:attr="data-id=${orderId}"
            ></a>
        </span>
    </div>
</div>

<div class="now-end-orders" th:if="${nowEnd != null && nowEnd.size() > 0}">
    <h3 class="category-header blue">Заканчиваются сегодня</h3>
    <div class="now-end-content">
        <span th:each="orderId : ${nowEnd}">
            <a class="order-id blue-mark category-order"
               th:text="${orderId}"
               th:href="'#order-'+${orderId}"
               th:attr="data-id=${orderId}"
            ></a>
        </span>
    </div>
</div>

<div th:each="group : ${groups}">

    <div class="group-header" th:text="${group.getCity()} + ' | Заявок ' + ${group.orders.size()}"></div>

    <div class="order"
         th:each="order : ${group.orders}"
         th:id="'order-'+${order.getOrderId()}"
         th:classappend="${order.getStatus().name() == 'RETURNED' ? 'returned' : ''}">

        <div class="order-header" th:classappend="${order.getStatus().name() == 'READY' ? 'ready' : ''}">
                <span class="order-id blue-mark">
                    <a target="_blank"
                       th:attr="id=${order.getOrderId()}"
                       th:text="${order.getOrderId()}"
                       th:href="${order.getUrl()}"></a>
                </span>
            <span class="address"
                  th:text="${order.getAddress()} + ${order.getAddress().equals('') || order.getPoint().equals('') ? '': ','}"></span>
            <span class="address" th:text="${order.getPoint()}"></span>
            <span class="target-date"
                  th:text="${order.getTargetDate()}"
                  th:classappend="${order.getTargetDateCss()}"></span>
        </div>

        <div class="order-content hidden">
            <div class="create-at">
                <span th:text="'Создана: ' + ${order.getCreatAt()}"></span> |
                <span th:text="'Канал: ' + ${order.getChanel()}"></span>
            </div>
            <div class="tasks">
                <table class="tasks-table">
                    <tr class="task" th:each="task : ${order.tasks}">
                        <td class="task-work" th:text="${task.work}"></td>
                        <td class="task-equipment" th:text="${task.getEquipment()}"></td>
                        <td class="task-volume" th:text="${task.volume}"></td>
                    </tr>
                </table>
                <a class="response" target="_top"
                   th:attr="data-id=${order.getOrderId()}"
                   th:href="${order.getMailToUrl()}">ОТЧЕТ</a>

                <div class="trash-comment" th:if="${order.getTrashTasks() != null}">
                    <div class="trash-task-header">Расшифровка работ</div>
                    <table>
                        <tr th:each="trash : ${order.getTrashTasks()}">
                            <td th:utext="${trash.work()}"></td>
                            <td class="trash-task-volume" th:text="${trash.volume()}"></td>
                        </tr>
                    </table>
                </div>
            </div>
            <div class="comment" th:if="${order.getComment() != null}">
                <div class="comment-header">КОММЕНТАРИЙ:</div>
                <div class="comment-content" th:utext="${order.getComment()}"></div>
                <table class="finalize-comments" th:if="${order.getFinalizeComments() != null}">
                    <tr th:each="comment : ${order.getFinalizeComments()}">
                        <td class="finalize-comment-data" th:text="${comment.getShortDate()}"></td>
                        <td class="finalize-comment-content" th:text="${comment.comment}"></td>
                    </tr>
                </table>
            </div>
            <div class="response-buffer" th:unless="${order.getComment() != null}"></div>

        </div>

        <div class="order-info">
            <img class="info-img" th:if="${order.isElectro()}"
                 src="https://pics66.ru/9/flash.png" alt="электрика">
            <img class="info-img" th:if="${order.isRepair()}"
                 src="https://pics66.ru/9/tools.png" alt="ремонт">
            <img class="info-img" th:if="${order.isAudit()}"
                 src="https://pics66.ru/9/find.png" alt="аудит">
            <img class="info-img" th:if="${order.isCargo()}"
                 src="https://pics66.ru/9/truck.png" alt="грузовой">
            <img class="info-img" th:if="${order.isTrash()}"
                 src="https://pics66.ru/9/trash.png" alt="утилизация">
            <span class="order-status"
                  th:text="${order.getStatus().getLabelText()}"
                  th:classappend="${order.getStatus().getCss()}"></span>
        </div>

        <div th:if="${admin}" th:text="${order.getMailToUrl()}"></div>

    </div>

</div>

<div class="footer">2018-2026 © Алексей Маслов</div>

<script>
    const switchButton = document.getElementById('global-visible-switch');
    if (switchButton) {
        switchButton.addEventListener('click', function () {
            const blocks = document.querySelectorAll('.order-content');
            const isFirstBlockHidden = blocks.length > 0 && blocks[0].classList.contains('hidden');
            if (isFirstBlockHidden) {
                blocks.forEach(block => block.classList.remove('hidden'));
                switchButton.textContent = 'Скрыть заявки';
            } else {
                blocks.forEach(block => block.classList.add('hidden'));
                switchButton.textContent = 'Показать заявки';
            }
        });
    }
    const groupHeaders = document.querySelectorAll('.group-header');
    groupHeaders.forEach(header => {
        header.addEventListener('click', function () {
            const container = header.parentElement;
            if (container) {
                const blocks = container.querySelectorAll('.order-content')
                const isFirstBlockHidden = blocks.length > 0 && blocks[0].classList.contains('hidden');
                if (isFirstBlockHidden) {
                    blocks.forEach(block => block.classList.remove('hidden'));
                } else {
                    blocks.forEach(block => block.classList.add('hidden'));
                }
            }
        });
    });

    const headers = document.querySelectorAll('.order-header');
    headers.forEach(header => {
        header.addEventListener('click', function (event) {
            if (event.target.closest('.order-id')) return;
            const content = header.nextElementSibling;
            if (content && content.classList.contains('order-content')) {
                content.classList.toggle('hidden');
            }
        });
    });


    const responseButtons = document.querySelectorAll('.response');
    responseButtons.forEach(function (event) {
        const id = event.dataset.id;
        const target = document.getElementById(id);
        event.addEventListener('mouseenter', () => target?.classList.add('green-mark'));
        event.addEventListener('mouseleave', () => target?.classList.remove('green-mark'));
    });

    const nowEndOrders = document.querySelectorAll('.category-order');
    nowEndOrders.forEach(order => {
        order.addEventListener('click', function (event) {

            const id = event.target.dataset.id;
            const target = document.getElementById('order-' + id);

            let flashCount = 0;
            const maxFlashes = 3;

            function flash() {
                if (flashCount < maxFlashes) {
                    target.style.opacity = '0.3';
                    setTimeout(() => {
                        target.style.opacity = '1';
                        setTimeout(flash, 300);
                    }, 300);
                    flashCount++;
                }
            }

            flash();

        });
    });

</script>

</body>
</html>
