<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование</title>
    <style>
        .message {
            min-width: 1.2em;
        }

        .tabs {
            height: 35px;
        }

        .tab-button {
            padding: 5px 10px;
            margin: 1px 3px;
            background-color: lightgray;
            cursor: pointer;
        }

        .tab-button.active {
            background-color: blue;
            color: white;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        .order-link-container {
            display: none;
            margin-left: 10px;
        }

    </style>
    <script th:inline="javascript">
        /*<![CDATA[*/
        // Убраны лишние фигурные скобки {}
        const returnedUrlMap = /*[[${returned}]]*/ {};
        const trashUrlMap = /*[[${trash}]]*/ {};
        /*]]>*/
    </script>
</head>
<body>

<div>
    <a class="tab-button" href="/groups?admin=true">АДМИН</a>
    <a class="tab-button" href="/groups">ПРОСМОТР</a>
    <a class="tab-button" href="/api/upload/ftp?user=KGS">ВЫГРУЗИТЬ</a>
</div>

<div th:if="${trash != null && trash.size() > 0}">
    <h2>Загрузить расшифровку утилизации</h2>
    <div class="tabs">
        <span class="tab-button active" data-tab="tab-text">Text</span>
        <span class="tab-button" data-tab="tab-file">File</span>
    </div>
    <div class="tab-content">
        <div class="tab-pane active" id="tab-text">
            <form id="uploadTrashForm" method="post" action="/api/upload/trash"
                  enctype="application/x-www-form-urlencoded">
                <label for="select-trash-orderId">ID заказа:</label>
                <select id="select-trash-orderId" name="orderId" required>
                    <option value="" disabled selected>Выберите ID заказа</option>
                    <option th:each="orderId : ${trash.keySet()}" th:value="${orderId}"
                            th:text="${orderId}"></option>
                </select>
                <div class="order-link-container" id="trash-order-link-container">
                    <a id="trash-order-link" href="#" target="_blank"></a>
                </div>
                <br><br>

                <label for="trash-equipment">Оборудование:</label><br>
                <textarea id="trash-equipment" name="equipment" rows="4" cols="50" required></textarea><br><br>

                <button type="submit">Отправить</button>
            </form>
            <div class="message" id="uploadTrashForm-message"></div>
        </div>
        <div class="tab-pane" id="tab-file">
            <form id="uploadTrashFileForm" method="post" action="/api/upload/trash/file" enctype="multipart/form-data">
                <input type="file" name="file" accept=".txt" required/>
                <button type="submit">Загрузить</button>
            </form>
            <div class="message" id="uploadTrashFileForm-message"></div>
        </div>
    </div>
</div>

<div th:if="${returned != null && returned.size() > 0}">
    <h2>Добавить коммент</h2>
    <form id="addComment" method="post" action="/api/upload/comment" enctype="application/x-www-form-urlencoded">
        <label for="select-returned-orderId">ID заказа:</label>
        <select id="select-returned-orderId" name="orderId" required>
            <option value="" disabled selected>Выберите ID заказа</option>
            <option th:each="orderId : ${returned.keySet()}" th:value="${orderId}" th:text="${orderId}"></option>
        </select>
        <div class="order-link-container" id="returned-order-link-container">
            <a id="returned-order-link" href="#" target="_blank"></a>
        </div>
        <br><br>

        <label for="comment-date">Дата:</label>
        <input type="date" id="comment-date" name="date" required><br><br>

        <label for="comment-content">Комментарий:</label><br>
        <textarea id="comment-content" name="comment" rows="4" cols="50" required></textarea><br><br>

        <button type="submit">Отправить</button>
    </form>
    <div class="message" id="addComment-message"></div>
</div>

<script>
    const dateInput = document.getElementById('comment-date');
    const today = new Date().toISOString().split('T')[0];
    dateInput.value = today;


    function handleFormSubmit(formId, redirectUrl) {

        const form = document.getElementById(formId);
        if (!form) return;

        form.onsubmit = function (event) {
            event.preventDefault();

            const formData = new FormData(this);

            fetch(this.action, {
                method: 'POST',
                body: formData
            })
                .then(response => response.text())
                .then(message => {
                    document.getElementById(formId + '-message').innerText = message;

                    if (message.includes("успешно")) {
                        window.location.href = redirectUrl;
                    }
                })
                .catch(error => {
                    document.getElementById(formId + '-message').innerText = "Ошибка сети: " + error;
                });
        };
    }

    handleFormSubmit('uploadTrashForm', '/edit');
    handleFormSubmit('uploadTrashFileForm', '/edit');
    handleFormSubmit('addComment', '/edit');

    document.querySelectorAll('.tab-button')
        .forEach(button => {
            button.addEventListener('click', function () {

                document.querySelectorAll('.tab-button')
                    .forEach(button => button.classList.remove('active'));
                this.classList.add('active');

                const tabId = this.getAttribute('data-tab');
                document.querySelectorAll('.tab-pane')
                    .forEach(pane => {
                        pane.classList.remove('active');
                    });
                document.getElementById(tabId).classList.add('active');

            });
        });


    function setupOrderLink(selectId, containerId, linkId, urlMap) {
        const selectElement = document.getElementById(selectId);
        const linkContainer = document.getElementById(containerId);
        const linkElement = document.getElementById(linkId);

        selectElement.addEventListener('change', function () {
            const selectedOrderId = selectElement.value;

            if (selectedOrderId && urlMap.hasOwnProperty(selectedOrderId)) {
                linkElement.href = urlMap[selectedOrderId];
                linkElement.textContent = 'Перейти к заявке ' + selectedOrderId;
                linkContainer.style.display = 'inline';
            } else {
                linkContainer.style.display = 'none';
            }
        });
    }

    setupOrderLink('select-trash-orderId', 'trash-order-link-container', 'trash-order-link', trashUrlMap);
    setupOrderLink('select-returned-orderId', 'returned-order-link-container', 'returned-order-link', returnedUrlMap);

</script>

</body>
</html>
